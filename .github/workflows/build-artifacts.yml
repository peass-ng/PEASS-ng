name: Build artifacts (winPEAS.exe + linpeas.sh)

# Trigger manually from the Actions tab — no automatic runs.
on:
  workflow_dispatch:

jobs:
  # ── Windows: compile winPEAS.exe ──────────────────────────────────────────
  build-winpeas:
    name: Build winPEAS.exe (Windows)
    runs-on: windows-latest

    env:
      Solution_Path: 'winPEAS\winPEASexe\winPEAS.sln'
      Configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download regexes
        run: powershell.exe -ExecutionPolicy Bypass -File build_lists/download_regexes.ps1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore $env:Solution_Path

      - name: Build (Any CPU)
        run: >
          msbuild $env:Solution_Path
          /t:Rebuild
          /p:Configuration=$env:Configuration
          /p:Platform="Any CPU"
          /p:UseSharedCompilation=false
          /nologo

      - name: Upload winPEAS.exe
        uses: actions/upload-artifact@v4
        with:
          name: winPEAS-exe
          path: winPEAS/winPEASexe/winPEAS/bin/${{ env.Configuration }}/winPEAS.exe
          if-no-files-found: error

  # ── Linux: build linpeas.sh ───────────────────────────────────────────────
  build-linpeas:
    name: Build linpeas.sh (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install builder dependencies
        run: pip install pyyaml requests

      - name: Build linpeas.sh (all modules)
        run: >
          python -m linPEAS.builder.linpeas_builder
          --all
          --output linpeas.sh

      - name: Upload linpeas.sh
        uses: actions/upload-artifact@v4
        with:
          name: linpeas-sh
          path: linpeas.sh
          if-no-files-found: error
