name: Update Windows Version Definitions

on:
  schedule:
    - cron: "17 4 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-definitions:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: python3 -m pip install --disable-pip-version-check openpyxl

      - name: Update windows version definitions
        timeout-minutes: 50
        run: python3 build_lists/update_windows_version_defs.py --verbose

      - name: Validate windows version definitions
        run: python3 build_lists/validate_windows_version_defs.py

      - name: Commit and push changes
        run: |
          if git diff --quiet -- build_lists/windows_version_exploits.json build_lists/validate_windows_version_defs.py; then
            echo "No windows version definition updates detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build_lists/windows_version_exploits.json build_lists/validate_windows_version_defs.py
          git commit -m "chore(winpeas): update windows version vulnerability definitions"
          git pull --rebase origin master
          git push origin HEAD:master
